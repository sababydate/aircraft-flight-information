<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>航班資訊</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f7f8fa;
    }
  </style>
</head>
<body>

<div style="display: flex; gap: 24px; font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', '微軟正黑體', sans-serif; flex-wrap: wrap; color: #111; line-height: 1.5; max-width: 1000px; margin: 0 auto;">
  
  <!-- 去程 -->
  <div style="flex: 1; min-width: 320px;">
    <h3 style="color: #2f68c4; font-size: 18px; font-weight: bold; margin: 0 0 12px 0;">去程</h3>
    <div style="background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-radius: 6px; display: flex; align-items: center; padding: 20px 16px; border-left: 5px solid #3b82f6; min-height: 100px;">
      <div style="text-align: center; padding-right: 16px; border-right: 2px solid #3b82f6; width: 90px; flex-shrink: 0;">
        <div style="color: #3b82f6; font-weight: bold; font-size: 15px;">Day 1</div>
        <div style="font-weight: bold; font-size: 15px; margin: 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">台灣虎航</div>
        <div style="color: #3b82f6; font-weight: bold; font-size: 16px;">尚未公開</div>
      </div>
      <div style="flex: 1; display: flex; justify-content: space-between; align-items: center; padding-left: 16px;">
        <div style="text-align: center; flex: 1;">
          <div style="color: #3b82f6; font-weight: bold; font-size: 15px;">Departure</div>
          <div style="font-weight: bold; font-size: 15px; margin: 10px 0;">台北-桃園機場</div>
          <div style="color: #3b82f6; font-weight: bold; font-size: 18px;">11:30</div>
        </div>
        <div style="padding: 0 12px; color: #111; display: flex; align-items: center;">
          ✈
        </div>
        <div style="text-align: center; flex: 1;">
          <div style="color: #3b82f6; font-weight: bold; font-size: 15px;">Arrival</div>
          <div style="font-weight: bold; font-size: 15px; margin: 10px 0;">岡山桃太郎機場</div>
          <div style="color: #3b82f6; font-weight: bold; font-size: 18px;">15:05</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 回程 -->
  <div style="flex: 1; min-width: 320px;">
    <h3 style="color: #2f68c4; font-size: 18px; font-weight: bold; margin: 0 0 12px 0;">回程</h3>
    <div style="background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-radius: 6px; display: flex; align-items: center; padding: 20px 16px; border-left: 5px solid #3b82f6; min-height: 100px;">
      <div style="text-align: center; padding-right: 16px; border-right: 2px solid #3b82f6; width: 90px; flex-shrink: 0;">
        <div style="color: #3b82f6; font-weight: bold; font-size: 15px;">Day 6</div>
        <div style="font-weight: bold; font-size: 15px; margin: 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">台灣虎航</div>
        <div style="color: #3b82f6; font-weight: bold; font-size: 16px;">尚未公開</div>
      </div>
      <div style="flex: 1; display: flex; justify-content: space-between; align-items: center; padding-left: 16px;">
        <div style="text-align: center; flex: 1;">
          <div style="color: #3b82f6; font-weight: bold; font-size: 15px;">Departure</div>
          <div style="font-weight: bold; font-size: 15px; margin: 10px 0;">岡山桃太郎機場</div>
          <div style="color: #3b82f6; font-weight: bold; font-size: 18px;">15:55</div>
        </div>
        <div style="padding: 0 12px; color: #111; display: flex; align-items: center;">
          ✈
        </div>
        <div style="text-align: center; flex: 1;">
          <div style="color: #3b82f6; font-weight: bold; font-size: 15px;">Arrival</div>
          <div style="font-weight: bold; font-size: 15px; margin: 10px 0;">台北-桃園機場</div>
          <div style="color: #3b82f6; font-weight: bold; font-size: 18px;">17:40</div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
